patterns:
  # ---------------------------------------------------------------------------
  # alterx-large-practical.yaml
  #
  # Large but practical AlterX profile for bug bounty / authorized recon.
  #
  # Design goals:
  # - High-signal permutations first
  # - Environment/service/cloud/region-aware naming
  # - Useful for HackerOne/Bugcrowd style external attack-surface discovery
  # - Avoid pure brute-force garbage as much as possible
  #
  # Notes:
  # - `-enrich/-e` usually enriches `word` and `number` payloads only.
  # - Custom payload groups below are static but valid in pattern variables.
  # - Run generated output through DNS resolution before any active probing.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Core dash permutations
  # ---------------------------------------------------------------------------
  - "{{word}}-{{sub}}.{{suffix}}"
  - "{{sub}}-{{word}}.{{suffix}}"
  - "{{env}}-{{sub}}.{{suffix}}"
  - "{{sub}}-{{env}}.{{suffix}}"
  - "{{service}}-{{sub}}.{{suffix}}"
  - "{{sub}}-{{service}}.{{suffix}}"
  - "{{tech}}-{{sub}}.{{suffix}}"
  - "{{sub}}-{{tech}}.{{suffix}}"
  - "{{cloud}}-{{sub}}.{{suffix}}"
  - "{{sub}}-{{cloud}}.{{suffix}}"

  # ---------------------------------------------------------------------------
  # Core dot permutations
  # ---------------------------------------------------------------------------
  - "{{word}}.{{sub}}.{{suffix}}"
  - "{{sub}}.{{word}}.{{suffix}}"
  - "{{env}}.{{sub}}.{{suffix}}"
  - "{{sub}}.{{env}}.{{suffix}}"
  - "{{service}}.{{sub}}.{{suffix}}"
  - "{{sub}}.{{service}}.{{suffix}}"
  - "{{tech}}.{{sub}}.{{suffix}}"
  - "{{sub}}.{{tech}}.{{suffix}}"
  - "{{cloud}}.{{sub}}.{{suffix}}"
  - "{{sub}}.{{cloud}}.{{suffix}}"

  # ---------------------------------------------------------------------------
  # No-separator permutations
  # ---------------------------------------------------------------------------
  - "{{sub}}{{word}}.{{suffix}}"
  - "{{word}}{{sub}}.{{suffix}}"
  - "{{sub}}{{env}}.{{suffix}}"
  - "{{env}}{{sub}}.{{suffix}}"
  - "{{sub}}{{service}}.{{suffix}}"
  - "{{service}}{{sub}}.{{suffix}}"
  - "{{sub}}{{tech}}.{{suffix}}"
  - "{{tech}}{{sub}}.{{suffix}}"
  - "{{sub}}{{cloud}}.{{suffix}}"
  - "{{cloud}}{{sub}}.{{suffix}}"

  # ---------------------------------------------------------------------------
  # Replace current label with high-signal payloads
  # ---------------------------------------------------------------------------
  - "{{word}}.{{suffix}}"
  - "{{env}}.{{suffix}}"
  - "{{service}}.{{suffix}}"
  - "{{tech}}.{{suffix}}"
  - "{{cloud}}.{{suffix}}"
  - "{{region}}.{{suffix}}"
  - "{{business}}.{{suffix}}"

  # ---------------------------------------------------------------------------
  # Numeric instances
  # ---------------------------------------------------------------------------
  - "{{sub}}{{number}}.{{suffix}}"
  - "{{sub}}-{{number}}.{{suffix}}"
  - "{{sub}}.{{number}}.{{suffix}}"
  - "{{word}}{{number}}.{{suffix}}"
  - "{{word}}-{{number}}.{{suffix}}"
  - "{{service}}{{number}}.{{suffix}}"
  - "{{service}}-{{number}}.{{suffix}}"
  - "{{env}}{{number}}.{{suffix}}"
  - "{{env}}-{{number}}.{{suffix}}"
  - "{{tech}}{{number}}.{{suffix}}"
  - "{{tech}}-{{number}}.{{suffix}}"

  # ---------------------------------------------------------------------------
  # Environment + service
  # ---------------------------------------------------------------------------
  - "{{env}}-{{service}}.{{suffix}}"
  - "{{service}}-{{env}}.{{suffix}}"
  - "{{env}}.{{service}}.{{suffix}}"
  - "{{service}}.{{env}}.{{suffix}}"
  - "{{env}}-{{service}}-{{sub}}.{{suffix}}"
  - "{{sub}}-{{env}}-{{service}}.{{suffix}}"
  - "{{env}}.{{service}}.{{sub}}.{{suffix}}"
  - "{{service}}.{{env}}.{{sub}}.{{suffix}}"
  - "{{sub}}.{{env}}.{{service}}.{{suffix}}"

  # ---------------------------------------------------------------------------
  # Region-aware
  # ---------------------------------------------------------------------------
  - "{{region}}.{{sub}}.{{suffix}}"
  - "{{sub}}.{{region}}.{{suffix}}"
  - "{{region}}-{{sub}}.{{suffix}}"
  - "{{sub}}-{{region}}.{{suffix}}"
  - "{{region}}.{{service}}.{{suffix}}"
  - "{{service}}.{{region}}.{{suffix}}"
  - "{{region}}-{{service}}.{{suffix}}"
  - "{{service}}-{{region}}.{{suffix}}"
  - "{{region}}.{{env}}.{{service}}.{{suffix}}"
  - "{{env}}.{{region}}.{{service}}.{{suffix}}"
  - "{{service}}.{{region}}.{{env}}.{{suffix}}"
  - "{{region}}-{{env}}-{{service}}.{{suffix}}"
  - "{{env}}-{{region}}-{{service}}.{{suffix}}"
  - "{{service}}-{{region}}-{{env}}.{{suffix}}"

  # ---------------------------------------------------------------------------
  # Cloud/provider-aware
  # ---------------------------------------------------------------------------
  - "{{cloud}}.{{service}}.{{suffix}}"
  - "{{service}}.{{cloud}}.{{suffix}}"
  - "{{cloud}}-{{service}}.{{suffix}}"
  - "{{service}}-{{cloud}}.{{suffix}}"
  - "{{env}}.{{cloud}}.{{service}}.{{suffix}}"
  - "{{cloud}}.{{env}}.{{service}}.{{suffix}}"
  - "{{service}}.{{env}}.{{cloud}}.{{suffix}}"
  - "{{env}}-{{cloud}}-{{service}}.{{suffix}}"
  - "{{cloud}}-{{env}}-{{service}}.{{suffix}}"
  - "{{service}}-{{env}}-{{cloud}}.{{suffix}}"

  # ---------------------------------------------------------------------------
  # API-focused
  # ---------------------------------------------------------------------------
  - "api-{{env}}.{{suffix}}"
  - "{{env}}-api.{{suffix}}"
  - "api.{{env}}.{{suffix}}"
  - "{{env}}.api.{{suffix}}"
  - "api-{{region}}.{{suffix}}"
  - "{{region}}-api.{{suffix}}"
  - "api.{{region}}.{{suffix}}"
  - "{{region}}.api.{{suffix}}"
  - "api-{{service}}.{{suffix}}"
  - "{{service}}-api.{{suffix}}"
  - "api.{{service}}.{{suffix}}"
  - "{{service}}.api.{{suffix}}"
  - "api{{number}}.{{suffix}}"
  - "api-{{number}}.{{suffix}}"
  - "api.v{{number}}.{{suffix}}"
  - "v{{number}}.api.{{suffix}}"

  # ---------------------------------------------------------------------------
  # Admin/auth/internal high-signal
  # ---------------------------------------------------------------------------
  - "{{env}}-admin.{{suffix}}"
  - "admin-{{env}}.{{suffix}}"
  - "{{env}}.admin.{{suffix}}"
  - "admin.{{env}}.{{suffix}}"
  - "{{env}}-internal.{{suffix}}"
  - "internal-{{env}}.{{suffix}}"
  - "{{env}}.internal.{{suffix}}"
  - "internal.{{env}}.{{suffix}}"
  - "{{env}}-login.{{suffix}}"
  - "login-{{env}}.{{suffix}}"
  - "{{env}}.login.{{suffix}}"
  - "login.{{env}}.{{suffix}}"
  - "{{env}}-auth.{{suffix}}"
  - "auth-{{env}}.{{suffix}}"
  - "{{env}}.auth.{{suffix}}"
  - "auth.{{env}}.{{suffix}}"
  - "{{env}}-sso.{{suffix}}"
  - "sso-{{env}}.{{suffix}}"
  - "{{env}}.sso.{{suffix}}"
  - "sso.{{env}}.{{suffix}}"

  # ---------------------------------------------------------------------------
  # Business/product-area permutations
  # ---------------------------------------------------------------------------
  - "{{business}}-{{sub}}.{{suffix}}"
  - "{{sub}}-{{business}}.{{suffix}}"
  - "{{business}}.{{sub}}.{{suffix}}"
  - "{{sub}}.{{business}}.{{suffix}}"
  - "{{env}}-{{business}}.{{suffix}}"
  - "{{business}}-{{env}}.{{suffix}}"
  - "{{env}}.{{business}}.{{suffix}}"
  - "{{business}}.{{env}}.{{suffix}}"

  # ---------------------------------------------------------------------------
  # Aggressive clusterbomb-style patterns
  # Uncomment only when you have a good resolver budget.
  # ---------------------------------------------------------------------------
  # - "{{word}}{{number}}-{{env}}.{{suffix}}"
  # - "{{env}}{{number}}-{{word}}.{{suffix}}"
  # - "{{service}}{{number}}-{{region}}.{{suffix}}"
  # - "{{region}}{{number}}-{{service}}.{{suffix}}"
  # - "{{word}}-{{env}}-{{number}}.{{suffix}}"
  # - "{{service}}-{{env}}-{{number}}.{{suffix}}"
  # - "{{env}}-{{service}}-{{number}}.{{suffix}}"

  # ---------------------------------------------------------------------------
  # Deep subdomain / sub-sub-subdomain permutations
  #
  # These are for targets where naming chains look like:
  #   dev.api.internal.example.com
  #   api.staging.us-east-1.example.com
  #   admin.portal.prod.eu.example.com
  #   grafana.monitoring.internal.corp.example.com
  #
  # Keep these resolved through dnsx first. They can generate a lot of names.
  # ---------------------------------------------------------------------------

  # 3-label chains before suffix
  - "{{env}}.{{service}}.{{sub}}.{{suffix}}"
  - "{{service}}.{{env}}.{{sub}}.{{suffix}}"
  - "{{word}}.{{env}}.{{sub}}.{{suffix}}"
  - "{{env}}.{{word}}.{{sub}}.{{suffix}}"
  - "{{service}}.{{word}}.{{sub}}.{{suffix}}"
  - "{{word}}.{{service}}.{{sub}}.{{suffix}}"
  - "{{region}}.{{env}}.{{sub}}.{{suffix}}"
  - "{{env}}.{{region}}.{{sub}}.{{suffix}}"
  - "{{region}}.{{service}}.{{sub}}.{{suffix}}"
  - "{{service}}.{{region}}.{{sub}}.{{suffix}}"
  - "{{cloud}}.{{service}}.{{sub}}.{{suffix}}"
  - "{{service}}.{{cloud}}.{{sub}}.{{suffix}}"

  # Insert two labels after known subdomain
  - "{{sub}}.{{env}}.{{service}}.{{suffix}}"
  - "{{sub}}.{{service}}.{{env}}.{{suffix}}"
  - "{{sub}}.{{word}}.{{service}}.{{suffix}}"
  - "{{sub}}.{{service}}.{{word}}.{{suffix}}"
  - "{{sub}}.{{region}}.{{service}}.{{suffix}}"
  - "{{sub}}.{{service}}.{{region}}.{{suffix}}"
  - "{{sub}}.{{cloud}}.{{service}}.{{suffix}}"
  - "{{sub}}.{{service}}.{{cloud}}.{{suffix}}"

  # 4-label chains before suffix
  - "{{env}}.{{service}}.{{region}}.{{sub}}.{{suffix}}"
  - "{{env}}.{{region}}.{{service}}.{{sub}}.{{suffix}}"
  - "{{service}}.{{env}}.{{region}}.{{sub}}.{{suffix}}"
  - "{{service}}.{{region}}.{{env}}.{{sub}}.{{suffix}}"
  - "{{region}}.{{env}}.{{service}}.{{sub}}.{{suffix}}"
  - "{{region}}.{{service}}.{{env}}.{{sub}}.{{suffix}}"
  - "{{cloud}}.{{env}}.{{service}}.{{sub}}.{{suffix}}"
  - "{{env}}.{{cloud}}.{{service}}.{{sub}}.{{suffix}}"
  - "{{service}}.{{cloud}}.{{env}}.{{sub}}.{{suffix}}"

  # Known subdomain + 3 inserted labels
  - "{{sub}}.{{env}}.{{service}}.{{region}}.{{suffix}}"
  - "{{sub}}.{{env}}.{{region}}.{{service}}.{{suffix}}"
  - "{{sub}}.{{service}}.{{env}}.{{region}}.{{suffix}}"
  - "{{sub}}.{{service}}.{{region}}.{{env}}.{{suffix}}"
  - "{{sub}}.{{region}}.{{env}}.{{service}}.{{suffix}}"
  - "{{sub}}.{{region}}.{{service}}.{{env}}.{{suffix}}"
  - "{{sub}}.{{cloud}}.{{env}}.{{service}}.{{suffix}}"
  - "{{sub}}.{{env}}.{{cloud}}.{{service}}.{{suffix}}"
  - "{{sub}}.{{service}}.{{cloud}}.{{env}}.{{suffix}}"

  # Deep admin/auth/internal routes
  - "{{env}}.admin.{{sub}}.{{suffix}}"
  - "admin.{{env}}.{{sub}}.{{suffix}}"
  - "{{env}}.internal.{{sub}}.{{suffix}}"
  - "internal.{{env}}.{{sub}}.{{suffix}}"
  - "{{env}}.login.{{sub}}.{{suffix}}"
  - "login.{{env}}.{{sub}}.{{suffix}}"
  - "{{env}}.auth.{{sub}}.{{suffix}}"
  - "auth.{{env}}.{{sub}}.{{suffix}}"
  - "{{env}}.sso.{{sub}}.{{suffix}}"
  - "sso.{{env}}.{{sub}}.{{suffix}}"

  # Deep API versions
  - "v{{number}}.api.{{sub}}.{{suffix}}"
  - "api.v{{number}}.{{sub}}.{{suffix}}"
  - "{{env}}.v{{number}}.api.{{sub}}.{{suffix}}"
  - "{{env}}.api.v{{number}}.{{sub}}.{{suffix}}"
  - "api.{{env}}.v{{number}}.{{sub}}.{{suffix}}"
  - "{{region}}.api.v{{number}}.{{sub}}.{{suffix}}"
  - "api.{{region}}.v{{number}}.{{sub}}.{{suffix}}"

  # Deep dash+dot hybrid patterns
  - "{{env}}-{{service}}.{{sub}}.{{suffix}}"
  - "{{service}}-{{env}}.{{sub}}.{{suffix}}"
  - "{{region}}-{{service}}.{{sub}}.{{suffix}}"
  - "{{service}}-{{region}}.{{sub}}.{{suffix}}"
  - "{{env}}-{{region}}.{{service}}.{{sub}}.{{suffix}}"
  - "{{region}}-{{env}}.{{service}}.{{sub}}.{{suffix}}"
  - "{{service}}-{{env}}.{{region}}.{{sub}}.{{suffix}}"

